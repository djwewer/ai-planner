services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
      POSTGRES_DB: planner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-planner-api.rule=Host(`api.ai-planner.example.com`)"
      - "traefik.http.routers.ai-planner-api.entrypoints=websecure"
      - "traefik.http.routers.ai-planner-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.ai-planner-api.loadbalancer.server.port=8000"

volumes:
  postgres_data:

networks:
  traefik:
    external: true
